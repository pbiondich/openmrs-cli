name: release

on:
  push:
    tags:
      - "v*"
      # Forgive a missing v: the GitHub UI happily creates bare tags like
      # 0.7.1, and a release with no artifacts is worse than a loose glob.
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
